name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write

jobs:
  publish-latest-json:
    name: Publish latest.json
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: |
          TAG="${{ github.event.workflow_run.head_branch }}"
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Download release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ${{ steps.version.outputs.tag }} \
            --pattern "*.sig" \
            --pattern "*.exe" \
            --pattern "*.AppImage" \
            --dir ./dist-artifacts

      - name: Generate latest.json
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

          WIN_SIG=$(cat ./dist-artifacts/*_x64-setup.exe.sig 2>/dev/null || echo "")
          LINUX_SIG=$(cat ./dist-artifacts/*_amd64.AppImage.sig 2>/dev/null || echo "")
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          cat > latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "Voir les releases GitHub pour le détail des changements.",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "windows-x86_64": {
                "url": "${BASE_URL}/mam-plannings_${VERSION}_x64-setup.exe",
                "signature": "${WIN_SIG}"
              },
              "linux-x86_64": {
                "url": "${BASE_URL}/mam-plannings_${VERSION}_amd64.AppImage",
                "signature": "${LINUX_SIG}"
              }
            }
          }
          EOF

      - name: Upload latest.json to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ steps.version.outputs.tag }} latest.json --clobber
